version: '3.8'

# Configuración para producción: usa DATABASE_URL del .env (base de datos externa)

services:
  # API FastAPI (Producción)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backendhotel_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      PROJECT_NAME: ${PROJECT_NAME:-Sistema de Reservas de Hotel}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-habitaciones}
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "
        echo 'Iniciando API en modo producción...' &&
        sleep 2 &&
        python scripts/init_database.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    networks:
      - backendhotel_network
    restart: unless-stopped

networks:
  backendhotel_network:
    driver: bridge
