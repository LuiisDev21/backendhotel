version: '3.8'

# Configuración para usar una base de datos externa (ej: Supabase)
# Uso: docker-compose -f docker-compose.external-db.yml up --build

services:
  # API FastAPI (sin servicio db local)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backendhotel_api
    environment:
      # DATABASE_URL debe estar en tu archivo .env
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      PROJECT_NAME: ${PROJECT_NAME:-Sistema de Reservas de Hotel}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-habitaciones}
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "
        echo 'Usando base de datos externa: ${DATABASE_URL}' &&
        echo 'Esperando 3 segundos...' &&
        sleep 3 &&
        python scripts/init_database.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - backendhotel_network
    restart: unless-stopped

networks:
  backendhotel_network:
    driver: bridge
